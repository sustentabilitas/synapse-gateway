name: Release

on:
  push:
    tags: ["synapse-gateway-v*", "synapse-proxy-v*", "synapse-mcp-v*", "synapse-context-v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      crate:
        description: Crate to release
        required: true
        type: choice
        options: [synapse-gateway, synapse-proxy, synapse-mcp, synapse-context]

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve crate + version
    runs-on: ubuntu-latest
    outputs:
      crate: ${{ steps.r.outputs.crate }}
      version: ${{ steps.r.outputs.version }}
      is_tag: ${{ steps.r.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            NAME="${GITHUB_REF_NAME}"               # e.g. synapse-proxy-v0.1.0
            echo "crate=${NAME%-v*}" >> "$GITHUB_OUTPUT"
            echo "version=${NAME##*-v}" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CRATE="${{ github.event.inputs.crate }}"
            VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r --arg c "$CRATE" '.packages[] | select(.name==$c) | .version')"
            echo "crate=${CRATE}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "crate=" >> "$GITHUB_OUTPUT"   # main push → edge job handles it
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

  publish-crate:
    name: Publish crate (crates.io)
    needs: resolve
    if: needs.resolve.outputs.crate != '' && (needs.resolve.outputs.is_tag == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify version is not already on crates.io
        env:
          CRATE: ${{ needs.resolve.outputs.crate }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          UA="synapse-release-bot (https://github.com/${{ github.repository }})"
          CODE="$(curl -s -o /dev/null -w '%{http_code}' \
            -H "User-Agent: ${UA}" \
            "https://crates.io/api/v1/crates/${CRATE}/${VERSION}")"
          if [[ "$CODE" == "200" ]]; then
            echo "::error::${CRATE}@${VERSION} is already published on crates.io — bump the version before tagging"
            exit 1
          fi
          if [[ "$CODE" != "404" ]]; then
            echo "::error::crates.io lookup for ${CRATE}@${VERSION} returned HTTP ${CODE}"
            exit 1
          fi
      - name: Verify tag version matches Cargo.toml
        env:
          CRATE: ${{ needs.resolve.outputs.crate }}
          WANT: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          HAVE="$(cargo metadata --no-deps --format-version 1 | jq -r --arg c "$CRATE" '.packages[] | select(.name==$c) | .version')"
          if [[ "${{ needs.resolve.outputs.is_tag }}" == "true" && "$WANT" != "$HAVE" ]]; then
            echo "::error::tag ${CRATE}-v${WANT} does not match Cargo.toml version ${HAVE}"
            exit 1
          fi
          echo "Publishing ${CRATE} ${HAVE}"
      - name: cargo publish
        run: cargo publish -p ${{ needs.resolve.outputs.crate }} --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker:
    name: Build & push image (Docker Hub)
    needs: resolve
    # Only the binary crates ship a Docker image; synapse-context / synapse-mcp are libraries.
    if: needs.resolve.outputs.crate != '' && (needs.resolve.outputs.is_tag == 'true' || github.event_name == 'workflow_dispatch') && contains(fromJSON('["synapse-gateway", "synapse-proxy"]'), needs.resolve.outputs.crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: sustentabilitas/${{ needs.resolve.outputs.crate }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=raw,value=latest,enable=${{ needs.resolve.outputs.is_tag == 'true' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/${{ needs.resolve.outputs.crate }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  edge:
    name: Build & push edge image (${{ matrix.crate }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [synapse-gateway, synapse-proxy]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/${{ matrix.crate }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: sustentabilitas/${{ matrix.crate }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
